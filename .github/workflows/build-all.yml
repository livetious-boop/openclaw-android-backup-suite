name: Build Windows EXE + Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r windows-app/requirements.txt

      - name: Run unit tests
        run: |
          cd windows-app
          python test_backup_manager.py -v

      - name: Run integration tests
        run: |
          cd windows-app
          python test_full_pipeline.py -v

      - name: Build EXE
        run: |
          cd windows-app
          pyinstaller --onefile --name "AndroidBackupManager" --windowed --icon=assets/icon.ico gui.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: AndroidBackupManager-Windows
          path: windows-app/dist/AndroidBackupManager.exe
          retention-days: 90

  build-android:
    name: Build Android Data Transfer APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        working-directory: android-app
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DataTransfer-Debug-APK
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DataTransfer-Release-APK
          path: android-app/app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    name: Create Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: AndroidBackupManager-Windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: DataTransfer-Debug-APK

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Android Backup Suite v1.0.${{ github.run_number }}
          body: |
            ## Android Backup Suite
            - **AndroidBackupManager.exe** — Windows backup app
            - **app-debug.apk** — Android Data Transfer app
            
            All tests passed. AES-256-GCM encryption verified.
          files: |
            AndroidBackupManager.exe
            *.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
